<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Registration Page</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            margin: 0; 
        }
        .container { 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 8px 24px rgba(0,0,0,0.15); 
            width: 350px; 
        }
        h2 { 
            text-align: center; 
            color: #333333; 
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 600; 
            color: #4a5568;
            font-size: 14px;
        }
        input[type="text"], input[type="email"], input[type="password"] { 
            width: 100%; 
            padding: 10px 12px; 
            border: 2px solid #e2e8f0; 
            border-radius: 6px; 
            box-sizing: border-box; 
            transition: border-color 0.2s;
            font-size: 14px;
        }
        input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus { 
            border-color: #667eea; 
            outline: none;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            margin-top: 15px;
            margin-bottom: 20px;
        }
        .checkbox-group input {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
            color: #4a5568;
        }
        button { 
            width: 100%; 
            padding: 12px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px;
            font-weight: bold;
            cursor: pointer; 
            transition: opacity 0.2s;
        }
        button:hover { 
            opacity: 0.9; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Account</h2>
    <!-- The action is now set to point directly to your welcome page -->
    <form action="welcome.html" method="GET">
        <div class="input-group">
            <label for="fname">Full Name</label>
            <input type="text" id="fname" name="fullname" placeholder="John Doe" required>
        </div>

        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="input-group">
            <label for="psw">Password</label>
            <input type="password" id="psw" name="password" placeholder="••••••••" required>
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="remember" name="remember">
            <label for="remember">Remember me</label>
        </div>

        <button type="submit">Sign Up</button>
    </form>
</div>

</body>
</html>
